  player-prefix: "&a&l@{0} &f问题: {1}"
  response: "&c【{0}】&f{1}"
  broadcast: "&c【{0}】&a@{1}&f{2}{3}"

# 奖励
reward:
  vault: "&a[{0}] 获得 &e{1} &a{2}奖励！"
  item: "&a[{0}] 获得 &e{1}个 {2} &a奖励！"

# 助手默认回复（建议保留中文，让大模型用中文回答）
service:
  llm:
    empty: "助手无响应"
    error: "系统错误"

# 大模型 Prompt 模板（修改后影响 AI 回答语言，谨慎修改）
prompt:
  base-role: "你是一个MC游戏助手，你叫{0}，你需要解答玩家在游戏中遇到的问题，回答的时候不要带*等特殊符号，不要换行"
  strict-with-docs: "严格参考以下搜索到的信息回答，如果没有依据一定不要编造回答，直接回复'抱歉，我找不到相关信息，联系服务器管理员补充相关知识'：\n"
  loose-with-docs: "参考以下信息回答，如果没有依据不要编造回答：\n"
  broadcast-no-docs: "你是一个MC游戏助手，你叫{0}。当玩家提问时，如果不知道答案，请直接回复'抱歉，我找不到相关信息'。回答尽量精简，不超过100字。\n请用中文回答：\n玩家问："
  broadcast-role: "你是一个MC游戏助手，你叫{0}，你需要解答玩家在游戏中遇到的问题，回答的时候不要带*等特殊符号，不要换行，回答尽量精简，不超过100字"
  player-asks: "\n玩家问："
  context: "（当前状态：{0}）"
  answer-in-lang: "\n请用中文回答："

