# 语言 / Language: zh_CN 或 en_US (also looks up plugins/ExAI/lang/<locale>.yml)
language: zh_CN

# 存储模式 / Storage mode
# mysql: 使用 MySQL 数据库 (需配置 storage-data)
# yml:   使用本地 YAML 文件 (数据保存在 plugins/ExAI/data/ 与 knowledge.yml)
storage:
  type: yml

# 存储数据 (仅 storage.type=mysql 时使用)
storage-data:
  address: 127.0.0.1:3306
  database: xx
  username: xx
  password: xx

# 大模型配置
llm:
  baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen-plus"
  apiKey: "填你自己的API"
  # AI 回答温度 (0~1)：越低越严谨、越不容易产生幻觉，事实问答建议 0.2~0.3
  temperature: 0.3
  # 公屏聊天相关
  chatKeywords: "吗,呢,么,嘛,咋,啥,谁,哪,哪里,哪儿,哪个,多少,多久,为何,为啥,为什么,如何,怎么,怎么办,怎么做,怎么用,怎么样,怎么回事,怎么搞,是不是,是否,能不能,可不可以,？,?"
  chatResponseCD: 60
  chatResponseEnabled: true
  chatResponseSuffix: "(可以通过菜单直接与我对话哦~，这个后缀可以修改成任意内容)"

# 助手配置
assistant:
  name: "ExAI"

# GUI配置
gui:
  title: "ExAI 对话助手"
  charNumPerLine: 30

# 知识库配置
knowledge:
  minSimilarity: 0.35
  # 单次回答最多注入的知识库文档数：越少越不容易拼凑出错误答案，建议 3~5
  maxDocs: 3
  maxPendingKnowledgePerPlayer: 30
  # 玩家书本提交的 AI 初审：开启后，玩家通过书本上传的问答会先交给 AI 判断是否适合入库，
  # 不符合规定(玩笑/广告/答非所问/明显错误/无意义)的不允许上传；通过的仍进入待审核队列等 OP 复核。
  # AI 服务不可用时拦截提交并提示玩家稍后再试。
  playerSubmitReview:
    enabled: true
  # 公屏问答自动采集：监听公屏「玩家提问→他人回答→(提问者感谢)」，
  # 由 AI 结合上下文判断该回答是否适合作为一条知识(二元判定，不打分)，过滤搞笑/不正经回复，
  # 通过的进入待审核队列供管理员复核；被提问者致谢的会带「已致谢」标识。
  autoCollect:
    enabled: true
    # 提问后多少秒内的他人回答视为候选回答
    answerWindowSeconds: 60
    # 回答出现后等待提问者感谢的时间窗(秒)，窗口结束仍会照常初审
    thanksWindowSeconds: 20
    # 过滤过短回答的最小字符数
    minAnswerLength: 4
    # 采集到新条目时，是否提示在线的审核员(拥有 opPermission)
    notifyReviewers: true
    # 感谢关键词(英文逗号分隔)，命中即视为提问者致谢
    thanksKeywords: "谢谢,感谢,thx,thanks,3q,谢了,多谢,懂了,明白了,学到了,解决了,有用"
  # 文档导入：把 plugins/ExAI/import/ 下的文档分片送入大模型，抽取成一条条问答知识，
  # 进入待审核队列由管理员逐段复核。使用命令 /exai import <文件名> 触发(仅 OP)。
  # 支持格式：txt / md / docx（老 .doc 不支持，请另存为 docx）；图片(png/jpg/jpeg/gif/bmp/webp)需配置下方 visionModel。
  documentImport:
    # 单次送入大模型的文档片段字符数：过大可能超出模型上下文，过小会增加调用次数
    chunkSize: 1500
    # 单次抽取允许的最大输出 token
    maxTokens: 1500
    # 抽取温度 (0~1)：低一些更忠于原文、更不易编造
    temperature: 0.3
    # 图片导入用的视觉模型(复用上方 llm 的 apiKey 与 baseUrl)。留空则不支持图片导入。
    # DashScope 可填 qwen-vl-plus 或 qwen-vl-max 等支持视觉的模型。
    visionModel: ""
  knowledgeReview:
    opPermission: "exai.op"
    rewards:
      vault:
        enabled: true
        amount: 100
        currencyName: "微光币"
      items:
        - material: DIAMOND
          amount: 1
        - material: APPLE
          amount: 5

